<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Request Dependency Map</title>
  <script src="https://unpkg.com/cytoscape@3.29.2/dist/cytoscape.min.js"></script>
  <script src="./request-graph-data.js"></script>
  <style>
    :root {
      --bg: #f4efe7;
      --panel: rgba(255, 251, 245, 0.96);
      --panel-strong: #fffaf2;
      --border: #d6c6af;
      --text: #1f2a33;
      --muted: #6e6458;
      --accent: #0b6e69;
      --accent-soft: #c6ece8;
      --warning: #bf6d2a;
      --danger: #a23c2c;
      --shadow: 0 20px 40px rgba(56, 39, 14, 0.12);
      --radius: 18px;
      --font: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: var(--font);
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(11, 110, 105, 0.16), transparent 30%),
        radial-gradient(circle at bottom right, rgba(191, 109, 42, 0.16), transparent 28%),
        linear-gradient(140deg, #f8f3ec 0%, #efe5d7 100%);
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1.8fr) minmax(380px, 0.9fr);
      gap: 18px;
      height: 100vh;
      padding: 18px;
      transition: grid-template-columns 180ms ease;
    }

    .layout.sidebar-collapsed {
      grid-template-columns: 1fr 56px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid rgba(214, 198, 175, 0.85);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      overflow: hidden;
    }

    .graph-panel {
      display: grid;
      grid-template-rows: auto auto 1fr;
      min-height: 0;
    }

    .hero {
      padding: 18px 20px 10px;
      border-bottom: 1px solid rgba(214, 198, 175, 0.7);
    }

    .hero h1 {
      margin: 0 0 8px;
      font-size: 1.45rem;
    }

    .hero p {
      margin: 0;
      color: var(--muted);
      line-height: 1.45;
    }

    .toolbar {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      padding: 14px 20px;
      border-bottom: 1px solid rgba(214, 198, 175, 0.7);
      background: rgba(255, 250, 242, 0.78);
    }

    .field {
      display: grid;
      gap: 6px;
      min-width: 0;
    }

    .field label {
      font-size: 0.8rem;
      color: var(--muted);
    }

    .field input,
    .field select,
    .field textarea,
    button {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 12px;
      font: inherit;
      color: var(--text);
      background: #fffdf9;
    }

    .field textarea {
      min-height: 120px;
      resize: vertical;
      font-family: Consolas, "Courier New", monospace;
      font-size: 0.86rem;
      line-height: 1.45;
    }

    button {
      cursor: pointer;
      background: linear-gradient(135deg, #0b6e69, #0f8b84);
      color: #fff;
      border: none;
      font-weight: 600;
      transition: transform 120ms ease, opacity 120ms ease;
    }

    button.secondary {
      background: #fff6ea;
      color: var(--text);
      border: 1px solid var(--border);
    }

    button.danger {
      background: linear-gradient(135deg, #8f3021, #b44635);
    }

    button:hover {
      transform: translateY(-1px);
    }

    #cy {
      min-height: 0;
      height: 100%;
      background:
        linear-gradient(rgba(255, 248, 239, 0.9), rgba(255, 248, 239, 0.9)),
        repeating-linear-gradient(
          0deg,
          rgba(214, 198, 175, 0.18),
          rgba(214, 198, 175, 0.18) 1px,
          transparent 1px,
          transparent 30px
        ),
        repeating-linear-gradient(
          90deg,
          rgba(214, 198, 175, 0.18),
          rgba(214, 198, 175, 0.18) 1px,
          transparent 1px,
          transparent 30px
        );
    }

    .sidebar {
      display: grid;
      grid-template-rows: auto auto auto auto 1fr;
      gap: 14px;
      padding: 16px;
      overflow: auto;
      position: relative;
    }

    .sidebar.collapsed {
      grid-template-rows: auto;
      padding: 16px 10px;
      overflow: hidden;
    }

    .sidebar.collapsed .section {
      display: none;
    }

    .sidebar-toggle-wrap {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 4px;
    }

    .sidebar.collapsed .sidebar-toggle-wrap {
      justify-content: center;
      margin: 0;
    }

    .sidebar-toggle {
      width: auto;
      min-width: 36px;
      padding: 10px 12px;
      border-radius: 12px;
      background: linear-gradient(135deg, #0b6e69, #0f8b84);
      color: #fff;
      font-size: 1rem;
      line-height: 1;
    }

    .section {
      border: 1px solid rgba(214, 198, 175, 0.7);
      background: var(--panel-strong);
      border-radius: 16px;
      padding: 14px;
    }

    .section h2 {
      margin: 0 0 10px;
      font-size: 1rem;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .card {
      border-radius: 14px;
      background: #fff;
      border: 1px solid rgba(214, 198, 175, 0.8);
      padding: 12px;
    }

    .card strong {
      display: block;
      font-size: 1.2rem;
      margin-bottom: 4px;
    }

    .card span {
      color: var(--muted);
      font-size: 0.84rem;
    }

    .detail-grid {
      display: grid;
      gap: 8px;
    }

    .detail-item {
      padding: 10px 12px;
      background: #fff;
      border-radius: 12px;
      border: 1px solid rgba(214, 198, 175, 0.8);
    }

    .detail-item b {
      display: block;
      margin-bottom: 4px;
      font-size: 0.82rem;
      color: var(--muted);
    }

    .linked-list,
    .ranking-list {
      display: grid;
      gap: 8px;
      max-height: 220px;
      overflow: auto;
    }

    .linked-row,
    .ranking-row {
      display: grid;
      gap: 4px;
      padding: 10px 12px;
      background: #fff;
      border-radius: 12px;
      border: 1px solid rgba(214, 198, 175, 0.8);
    }

    .ranking-row strong,
    .linked-row strong {
      font-size: 0.92rem;
    }

    .pill {
      display: inline-block;
      margin-right: 6px;
      margin-top: 6px;
      padding: 4px 8px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: #15514d;
      font-size: 0.75rem;
      font-weight: 600;
    }

    .actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .hint,
    .status {
      font-size: 0.83rem;
      color: var(--muted);
      line-height: 1.45;
    }

    .status.error {
      color: var(--danger);
    }

    .status.ok {
      color: var(--accent);
    }

    @media (max-width: 1180px) {
      .layout {
        grid-template-columns: 1fr;
        height: auto;
      }

      .graph-panel {
        min-height: 75vh;
      }

      .toolbar,
      .cards,
      .actions {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (max-width: 760px) {
      .layout {
        padding: 10px;
      }

      .toolbar,
      .cards,
      .actions {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="layout">
    <section class="panel graph-panel">
      <div class="hero">
        <h1>Request Dependency Map</h1>
      </div>
      <div class="toolbar">
        <div class="field">
          <label for="searchInput">Search Request</label>
          <input id="searchInput" type="text" placeholder="Type request, domain, or category">
        </div>
        <div class="field">
          <label for="domainFilter">Domain</label>
          <select id="domainFilter"></select>
        </div>
        <div class="field">
          <label for="categoryFilter">Category</label>
          <select id="categoryFilter"></select>
        </div>
        <div class="field">
          <label for="layoutSelect">Layout</label>
          <select id="layoutSelect">
            <option value="cose">Dependency View</option>
            <option value="breadthfirst">Top-Down</option>
            <option value="circle">Circle</option>
            <option value="concentric">Concentric</option>
          </select>
        </div>
      </div>
      <div id="cy"></div>
    </section>

    <aside class="panel sidebar">
      <div class="sidebar-toggle-wrap">
        <button id="sidebarToggle" class="sidebar-toggle" type="button" title="Collapse right panel" aria-expanded="true">⟩</button>
      </div>

      <section class="section">
        <h2>Portfolio Snapshot</h2>
        <div class="cards">
          <div class="card">
            <strong id="nodeCount">0</strong>
            <span>Processes</span>
          </div>
          <div class="card">
            <strong id="requestRange">0</strong>
            <span>Highest Request No.</span>
          </div>
          <div class="card">
            <strong id="edgeCount">0</strong>
            <span>Relations</span>
          </div>
          <div class="card">
            <strong id="highDependencyCount">0</strong>
            <span>High Dependency Nodes</span>
          </div>
        </div>
      </section>

      <section class="section">
        <h2>Selected Process</h2>
        <div id="details" class="detail-grid"></div>
        <div class="hint">Tip: click an edge to inspect or remove that relation.</div>
      </section>

      <section class="section">
        <h2>Top Dependency Ranking</h2>
        <div id="ranking" class="ranking-list"></div>
      </section>

      <section class="section">
        <h2>Edit Relations</h2>
        <div class="field">
          <label for="sourceSelect">Source Process</label>
          <select id="sourceSelect"></select>
        </div>
        <div class="field">
          <label for="targetSelect">Target Process</label>
          <select id="targetSelect"></select>
        </div>
        <div class="field">
          <label for="relationInput">Edge Label</label>
          <input id="relationInput" type="text" placeholder="PREREQUISITE">
        </div>
        <div class="actions">
          <button id="addEdgeButton" type="button">Add or Update</button>
          <button id="deleteEdgeButton" class="danger" type="button">Delete Selected Edge</button>
        </div>
        <div id="editorStatus" class="status">No pending issues.</div>
      </section>

      <section class="section">
        <h2>Editable JSON</h2>
        <div class="field">
          <label for="jsonEditor">Data Model</label>
          <textarea id="jsonEditor" spellcheck="false"></textarea>
        </div>
        <div class="actions">
          <button id="applyJsonButton" type="button">Apply JSON</button>
          <button id="exportJsonButton" class="secondary" type="button">Download JSON</button>
          <button id="resetButton" class="secondary" type="button">Reset Seed</button>
          <button id="importButton" class="secondary" type="button">Import JSON</button>
        </div>
        <input id="fileInput" type="file" accept=".json,application/json" hidden>
      </section>
    </aside>
  </div>

  <script>
    const STORAGE_KEY = "talabat-request-graph-state-v1";
    const elements = {
      cy: document.getElementById("cy"),
      searchInput: document.getElementById("searchInput"),
      domainFilter: document.getElementById("domainFilter"),
      categoryFilter: document.getElementById("categoryFilter"),
      layoutSelect: document.getElementById("layoutSelect"),
      details: document.getElementById("details"),
      ranking: document.getElementById("ranking"),
      nodeCount: document.getElementById("nodeCount"),
      edgeCount: document.getElementById("edgeCount"),
      highDependencyCount: document.getElementById("highDependencyCount"),
      requestRange: document.getElementById("requestRange"),
      sourceSelect: document.getElementById("sourceSelect"),
      targetSelect: document.getElementById("targetSelect"),
      relationInput: document.getElementById("relationInput"),
      addEdgeButton: document.getElementById("addEdgeButton"),
      deleteEdgeButton: document.getElementById("deleteEdgeButton"),
      jsonEditor: document.getElementById("jsonEditor"),
      applyJsonButton: document.getElementById("applyJsonButton"),
      exportJsonButton: document.getElementById("exportJsonButton"),
      resetButton: document.getElementById("resetButton"),
      importButton: document.getElementById("importButton"),
      fileInput: document.getElementById("fileInput"),
      editorStatus: document.getElementById("editorStatus"),
      sidebarToggle: document.getElementById("sidebarToggle"),
      layout: document.querySelector(".layout"),
      sidebar: document.querySelector(".sidebar")
    };

    let seedData = null;
    let state = null;
    let cy = null;
    let selectedNodeId = null;
    let selectedEdgeId = null;

    const unique = values => [...new Set(values)].sort((a, b) => a.localeCompare(b));

    function cloneData(data) {
      return JSON.parse(JSON.stringify(data));
    }

    function normalizeRelation(value) {
      return (value || "").trim().replace(/\s+/g, "_").toUpperCase();
    }

    function mergeRelationLabels(relations) {
      const parts = [];
      relations.forEach(relation => {
        String(relation || "")
          .split(/\s*-\s*/)
          .map(part => normalizeRelation(part))
          .filter(Boolean)
          .forEach(part => {
            if (!parts.includes(part)) {
              parts.push(part);
            }
          });
      });
      return parts.join(" - ");
    }

    function normalizeData(data) {
      const normalized = cloneData(data);
      const mergedEdges = new Map();

      normalized.edges.forEach(edge => {
        const key = `${edge.source}>>${edge.target}`;
        if (!mergedEdges.has(key)) {
          mergedEdges.set(key, {
            id: edge.id || `e${mergedEdges.size + 1}`,
            source: edge.source,
            target: edge.target,
            relation: mergeRelationLabels([edge.relation]),
            confidence: edge.confidence || "manual"
          });
          return;
        }

        const current = mergedEdges.get(key);
        current.relation = mergeRelationLabels([current.relation, edge.relation]);
        if ((current.confidence || "") !== (edge.confidence || "")) {
          current.confidence = "mixed";
        }
      });

      normalized.edges = [...mergedEdges.values()];
      return normalized;
    }

    function optionMarkup(value, label) {
      return `<option value="${escapeHtml(value)}">${escapeHtml(label)}</option>`;
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    function setStatus(message, kind = "") {
      elements.editorStatus.textContent = message;
      elements.editorStatus.className = `status ${kind}`.trim();
    }

    async function loadSeed() {
      try {
        const response = await fetch("./request-graph-data.json", { cache: "no-store" });
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }
        return normalizeData(await response.json());
      } catch (error) {
        console.warn("Falling back to local script seed data.", error);
        if (window.REQUEST_GRAPH_DATA) {
          return normalizeData(window.REQUEST_GRAPH_DATA);
        }
        throw error;
      }
    }

    function getStoredState() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) {
        return null;
      }
      try {
        return normalizeData(JSON.parse(raw));
      } catch (error) {
        console.warn("Invalid local state ignored.", error);
        return null;
      }
    }

    function persistState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      elements.jsonEditor.value = JSON.stringify(state, null, 2);
    }

    function buildLookups(data) {
      const nodesById = Object.fromEntries(data.nodes.map(node => [node.id, node]));
      const incoming = new Map(data.nodes.map(node => [node.id, []]));
      const outgoing = new Map(data.nodes.map(node => [node.id, []]));

      data.edges.forEach(edge => {
        if (incoming.has(edge.target)) {
          incoming.get(edge.target).push(edge);
        }
        if (outgoing.has(edge.source)) {
          outgoing.get(edge.source).push(edge);
        }
      });

      return { nodesById, incoming, outgoing };
    }

    function enrichNodes(data) {
      const { incoming, outgoing } = buildLookups(data);
      return data.nodes.map(node => {
        const inCount = incoming.get(node.id)?.length || 0;
        const outCount = outgoing.get(node.id)?.length || 0;
        return {
          ...node,
          inCount,
          outCount,
          totalLinks: inCount + outCount,
          isHighDependency: inCount + outCount >= 4
        };
      });
    }

    function populateFilters() {
      const nodes = enrichNodes(state);
      const domains = unique(nodes.map(node => node.domain).filter(Boolean));
      const categoryOptions = nodes
        .filter(node => !elements.domainFilter.value || elements.domainFilter.value === "__all__" || node.domain === elements.domainFilter.value)
        .map(node => node.category)
        .filter(Boolean);
      const categories = unique(categoryOptions);

      const currentDomain = elements.domainFilter.value || "__all__";
      const currentCategory = elements.categoryFilter.value || "__all__";

      elements.domainFilter.innerHTML = optionMarkup("__all__", "All Domains") + domains.map(domain => optionMarkup(domain, domain)).join("");
      elements.domainFilter.value = domains.includes(currentDomain) ? currentDomain : "__all__";

      elements.categoryFilter.innerHTML = optionMarkup("__all__", "All Categories") + categories.map(category => optionMarkup(category, category)).join("");
      elements.categoryFilter.value = categories.includes(currentCategory) ? currentCategory : "__all__";
    }

    function populateProcessSelectors() {
      const options = state.nodes
        .slice()
        .sort((a, b) => Number(a.id) - Number(b.id))
        .map(node => optionMarkup(node.id, `${node.id} - ${node.label}`))
        .join("");

      elements.sourceSelect.innerHTML = options;
      elements.targetSelect.innerHTML = options;

      if (selectedNodeId) {
        elements.sourceSelect.value = selectedNodeId;
      }
    }

    function getVisibleNodeIds() {
      const query = elements.searchInput.value.trim().toLowerCase();
      const domain = elements.domainFilter.value;
      const category = elements.categoryFilter.value;

      return new Set(
        state.nodes
          .filter(node => domain === "__all__" || !domain || node.domain === domain)
          .filter(node => category === "__all__" || !category || node.category === category)
          .filter(node => {
            if (!query) {
              return true;
            }
            const haystack = [node.label, node.arabicLabel, node.domain, node.category, node.note].join(" ").toLowerCase();
            return haystack.includes(query);
          })
          .map(node => node.id)
      );
    }

    function buildElements() {
      const visibleNodeIds = getVisibleNodeIds();
      const enrichedNodes = enrichNodes(state);
      const nodeMap = Object.fromEntries(enrichedNodes.map(node => [node.id, node]));
      const visibleEdges = state.edges.filter(edge => visibleNodeIds.has(edge.source) && visibleNodeIds.has(edge.target));

      return [
        ...enrichedNodes
          .filter(node => visibleNodeIds.has(node.id))
          .map(node => ({
            data: {
              ...node,
              size: 28 + Math.min(node.totalLinks * 5, 36)
            }
          })),
        ...visibleEdges.map(edge => ({
          data: {
            ...edge,
            sourceLabel: nodeMap[edge.source]?.label || edge.source,
            targetLabel: nodeMap[edge.target]?.label || edge.target
          }
        }))
      ];
    }

    function runLayout() {
      if (!cy) {
        return;
      }
      const name = elements.layoutSelect.value;
      const layout = cy.layout(
        name === "breadthfirst"
          ? { name, directed: true, padding: 40, spacingFactor: 1.2, animate: true }
          : name === "circle"
            ? { name, padding: 40, animate: true }
            : name === "concentric"
              ? {
                  name,
                  animate: true,
                  padding: 40,
                  concentric: node => node.data("totalLinks") || 1,
                  levelWidth: () => 1
                }
              : {
                  name: "cose",
                  animate: true,
                  fit: true,
                  padding: 50,
                  nodeRepulsion: 9000,
                  idealEdgeLength: 130,
                  edgeElasticity: 140
                }
      );
      layout.run();
    }

    function renderGraph() {
      const graphElements = buildElements();

      if (!cy) {
        cy = cytoscape({
          container: elements.cy,
          wheelSensitivity: 0.14,
          elements: graphElements,
          style: [
            {
              selector: "node",
              style: {
                label: "data(label)",
                "font-size": 10,
                "text-wrap": "wrap",
                "text-max-width": 92,
                "text-valign": "center",
                color: "#112126",
                "background-color": ele => ele.data("isHighDependency") ? "#0b6e69" : "#dfd1b9",
                "border-width": 2,
                "border-color": ele => ele.data("isHighDependency") ? "#084744" : "#b79f7e",
                width: "data(size)",
                height: "data(size)"
              }
            },
            {
              selector: "edge",
              style: {
                label: "data(relation)",
                "font-size": 8,
                color: "#6e6458",
                width: 2.1,
                "curve-style": "bezier",
                "target-arrow-shape": "triangle",
                "target-arrow-color": "#bf6d2a",
                "line-color": "#d7a574",
                "text-background-color": "#fffaf2",
                "text-background-opacity": 1,
                "text-background-padding": 2
              }
            },
            {
              selector: ":selected",
              style: {
                "overlay-color": "#0b6e69",
                "overlay-opacity": 0.12,
                "border-color": "#bf6d2a",
                "line-color": "#0b6e69",
                "target-arrow-color": "#0b6e69"
              }
            }
          ]
        });

        cy.on("tap", "node", event => {
          const node = event.target.data();
          selectedNodeId = node.id;
          selectedEdgeId = null;
          elements.sourceSelect.value = node.id;
          renderDetails(node.id);
        });

        cy.on("tap", "edge", event => {
          const edge = event.target.data();
          selectedEdgeId = edge.id;
          selectedNodeId = null;
          elements.sourceSelect.value = edge.source;
          elements.targetSelect.value = edge.target;
          elements.relationInput.value = edge.relation;
          renderEdgeDetails(edge);
        });

        cy.on("tap", event => {
          if (event.target === cy) {
            selectedNodeId = null;
            selectedEdgeId = null;
            renderDetails();
          }
        });
      } else {
        cy.elements().remove();
        cy.add(graphElements);
      }

      runLayout();
      renderSidebar();
    }

    function renderDetails(nodeId = null) {
      if (!nodeId) {
        elements.details.innerHTML = `
          <div class="detail-item"><b>Selection</b>Select a node to inspect its domain, category, request type, and linked processes.</div>
        `;
        return;
      }

      const { nodesById, incoming, outgoing } = buildLookups(state);
      const node = nodesById[nodeId];
      const links = [
        ...(incoming.get(nodeId) || []).map(edge => ({
          direction: "Depends On",
          relation: edge.relation,
          node: nodesById[edge.source]
        })),
        ...(outgoing.get(nodeId) || []).map(edge => ({
          direction: "Supports",
          relation: edge.relation,
          node: nodesById[edge.target]
        }))
      ];

      const linkedMarkup = links.length
        ? `<div class="linked-list">${links.map(link => `
            <div class="linked-row">
              <strong>${escapeHtml(link.node?.label || "Unknown process")}</strong>
              <span>${escapeHtml(link.direction)} | ${escapeHtml(link.relation)}</span>
              <span>${escapeHtml(link.node?.domain || "")} / ${escapeHtml(link.node?.category || "")}</span>
            </div>
          `).join("")}</div>`
        : `<div class="detail-item">No linked processes yet for this request.</div>`;

      elements.details.innerHTML = `
        <div class="detail-item"><b>ID</b>${escapeHtml(node.id)}</div>
        <div class="detail-item"><b>Service Domain</b>${escapeHtml(node.domain)}</div>
        <div class="detail-item"><b>Category</b>${escapeHtml(node.category)}</div>
        <div class="detail-item"><b>Service Request Type</b>${escapeHtml(node.requestType)}</div>
        <div class="detail-item"><b>Arabic</b>${escapeHtml(node.arabicLabel || "-")}</div>
        <div class="detail-item"><b>Linked Points</b>${linkedMarkup}</div>
      `;
    }

    function renderEdgeDetails(edge) {
      const { nodesById } = buildLookups(state);
      elements.details.innerHTML = `
        <div class="detail-item"><b>Selected Edge</b>${escapeHtml(edge.relation)}</div>
        <div class="detail-item"><b>Source</b>${escapeHtml(nodesById[edge.source]?.label || edge.source)}</div>
        <div class="detail-item"><b>Target</b>${escapeHtml(nodesById[edge.target]?.label || edge.target)}</div>
        <div class="detail-item"><b>Confidence</b>${escapeHtml(edge.confidence || "manual")}</div>
      `;
    }

    function renderRanking() {
      const ranked = enrichNodes(state)
        .sort((a, b) => b.totalLinks - a.totalLinks || Number(a.id) - Number(b.id))
        .slice(0, 12);

      elements.ranking.innerHTML = ranked.map((node, index) => `
        <div class="ranking-row">
          <strong>${index + 1}. ${escapeHtml(node.label)}</strong>
          <span>${escapeHtml(node.domain)} / ${escapeHtml(node.category)}</span>
          <span>
            <span class="pill">In ${node.inCount}</span>
            <span class="pill">Out ${node.outCount}</span>
            <span class="pill">Total ${node.totalLinks}</span>
          </span>
        </div>
      `).join("");
    }

    function renderSnapshot() {
      const nodes = enrichNodes(state);
      elements.nodeCount.textContent = nodes.length;
      elements.requestRange.textContent = nodes.reduce((max, node) => Math.max(max, Number(node.id) || 0), 0);
      elements.edgeCount.textContent = state.edges.length;
      elements.highDependencyCount.textContent = nodes.filter(node => node.isHighDependency).length;
    }

    function toggleSidebar() {
      const collapsed = elements.sidebar.classList.toggle("collapsed");
      elements.layout.classList.toggle("sidebar-collapsed", collapsed);
      elements.sidebarToggle.textContent = collapsed ? "⟨" : "⟩";
      elements.sidebarToggle.setAttribute("aria-expanded", String(!collapsed));
      elements.sidebarToggle.title = collapsed ? "Expand right panel" : "Collapse right panel";
      setTimeout(() => {
        if (cy) {
          cy.resize();
          cy.fit(undefined, 40);
        }
      }, 190);
    }

    function renderSidebar() {
      renderSnapshot();
      renderRanking();
      if (selectedNodeId) {
        renderDetails(selectedNodeId);
      } else if (!selectedEdgeId) {
        renderDetails();
      }
    }

    function createEdgeId() {
      const max = state.edges.reduce((highest, edge) => {
        const numeric = Number(String(edge.id || "").replace(/^\D+/g, ""));
        return Number.isFinite(numeric) ? Math.max(highest, numeric) : highest;
      }, 0);
      return `e${max + 1}`;
    }

    function addOrUpdateEdge() {
      const source = elements.sourceSelect.value;
      const target = elements.targetSelect.value;
      const relation = normalizeRelation(elements.relationInput.value);

      if (!source || !target || !relation) {
        setStatus("Source, target, and relation are required.", "error");
        return;
      }
      if (source === target) {
        setStatus("Source and target cannot be the same process.", "error");
        return;
      }

      const existing = state.edges.find(edge => edge.source === source && edge.target === target);
      if (existing) {
        existing.relation = relation;
        existing.confidence = "manual";
        selectedEdgeId = existing.id;
        setStatus("Relation updated.", "ok");
      } else {
        const edge = {
          id: createEdgeId(),
          source,
          target,
          relation,
          confidence: "manual"
        };
        state.edges.push(edge);
        selectedEdgeId = edge.id;
        setStatus("Relation added.", "ok");
      }

      persistState();
      renderGraph();
    }

    function deleteSelectedEdge() {
      if (!selectedEdgeId) {
        setStatus("Select an edge first to delete it.", "error");
        return;
      }
      const before = state.edges.length;
      state.edges = state.edges.filter(edge => edge.id !== selectedEdgeId);
      if (state.edges.length === before) {
        setStatus("Selected edge was not found.", "error");
        return;
      }
      selectedEdgeId = null;
      persistState();
      renderGraph();
      setStatus("Relation deleted.", "ok");
    }

    function validateData(data) {
      if (!data || !Array.isArray(data.nodes) || !Array.isArray(data.edges)) {
        throw new Error("JSON must contain nodes[] and edges[].");
      }

      const nodeIds = new Set();
      data.nodes.forEach(node => {
        if (!node.id || !node.label) {
          throw new Error("Each node needs at least id and label.");
        }
        if (nodeIds.has(node.id)) {
          throw new Error(`Duplicate node id: ${node.id}`);
        }
        nodeIds.add(node.id);
      });

      data.edges.forEach(edge => {
        if (!edge.source || !edge.target || !edge.relation) {
          throw new Error("Each edge needs source, target, and relation.");
        }
        if (!nodeIds.has(edge.source) || !nodeIds.has(edge.target)) {
          throw new Error(`Edge references unknown node: ${edge.source} -> ${edge.target}`);
        }
      });
    }

    function applyJson() {
      try {
        const parsed = JSON.parse(elements.jsonEditor.value);
        validateData(parsed);
        state = normalizeData(parsed);
        persistState();
        populateFilters();
        populateProcessSelectors();
        renderGraph();
        setStatus("JSON applied successfully.", "ok");
      } catch (error) {
        setStatus(error.message, "error");
      }
    }

    function exportJson() {
      const blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = "request-graph-data.updated.json";
      link.click();
      URL.revokeObjectURL(url);
      setStatus("JSON downloaded.", "ok");
    }

    function resetState() {
      state = normalizeData(seedData);
      localStorage.removeItem(STORAGE_KEY);
      persistState();
      populateFilters();
      populateProcessSelectors();
      renderGraph();
      setStatus("Reset to original extracted seed.", "ok");
    }

    function importJsonFile(file) {
      if (!file) {
        return;
      }
      const reader = new FileReader();
      reader.onload = () => {
        elements.jsonEditor.value = reader.result;
        applyJson();
      };
      reader.readAsText(file, "utf-8");
    }

    function attachEvents() {
      elements.searchInput.addEventListener("input", renderGraph);
      elements.domainFilter.addEventListener("change", () => {
        populateFilters();
        renderGraph();
      });
      elements.categoryFilter.addEventListener("change", renderGraph);
      elements.layoutSelect.addEventListener("change", runLayout);
      elements.addEdgeButton.addEventListener("click", addOrUpdateEdge);
      elements.deleteEdgeButton.addEventListener("click", deleteSelectedEdge);
      elements.applyJsonButton.addEventListener("click", applyJson);
      elements.exportJsonButton.addEventListener("click", exportJson);
      elements.resetButton.addEventListener("click", resetState);
      elements.importButton.addEventListener("click", () => elements.fileInput.click());
      elements.fileInput.addEventListener("change", event => importJsonFile(event.target.files[0]));
      elements.sidebarToggle.addEventListener("click", toggleSidebar);
    }

    async function init() {
      seedData = await loadSeed();
      const stored = getStoredState();
      state = normalizeData(stored || seedData);
      validateData(state);
      populateFilters();
      populateProcessSelectors();
      persistState();
      attachEvents();
      renderGraph();
      setStatus("Seed data loaded. You can edit relations or modify JSON directly.", "ok");
    }

    init().catch(error => {
      console.error(error);
      setStatus(`Unable to initialize page: ${error.message}`, "error");
      elements.details.innerHTML = `<div class="detail-item"><b>Initialization error</b>${escapeHtml(error.message)}</div>`;
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SPM — Strategies</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    [x-cloak] { display: none !important; }
    .status-draft     { background:#f3f4f6; color:#6b7280; }
    .status-active    { background:#dcfce7; color:#16a34a; }
    .status-on_hold   { background:#fef9c3; color:#ca8a04; }
    .status-completed { background:#dbeafe; color:#2563eb; }
    .status-deactivated { background:#fee2e2; color:#dc2626; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen" x-data="app()">

<!-- NAV -->
<nav class="bg-white border-b border-gray-200 px-6 py-3 flex items-center justify-between sticky top-0 z-40">
  <div class="flex items-center gap-3">
    <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center">
      <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
    </div>
    <span class="font-semibold text-gray-800 text-lg">Advance360</span>
    <span class="text-gray-300 mx-1">|</span>
    <span class="text-indigo-600 font-medium">Strategic Performance</span>
  </div>
  <div class="flex items-center gap-4">
    <a href="element-types.html" class="text-sm text-gray-500 hover:text-indigo-600 flex items-center gap-1">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
      Element Types
    </a>
    <div class="w-8 h-8 bg-indigo-100 rounded-full flex items-center justify-center text-indigo-700 font-semibold text-sm">AH</div>
  </div>
</nav>

<!-- MAIN -->
<div class="max-w-7xl mx-auto px-6 py-8">

  <!-- Header -->
  <div class="flex items-start justify-between mb-8">
    <div>
      <h1 class="text-2xl font-bold text-gray-900">Strategies</h1>
      <p class="text-gray-500 mt-1 text-sm">Manage your organization's strategic plans and their element graphs</p>
    </div>
    <div class="flex items-center gap-2">
      <a href="strategy-create.html"
         class="bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-medium px-4 py-2 rounded-lg flex items-center gap-2 transition">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
        New Strategy
      </a>
      <span class="text-xs text-gray-400 hidden md:block">Start from template or scratch</span>
    </div>
  </div>

  <!-- Filters -->
  <div class="flex items-center gap-3 mb-6">
    <template x-for="f in filters" :key="f.key">
      <button @click="activeFilter = f.key"
              :class="activeFilter === f.key ? 'bg-indigo-600 text-white' : 'bg-white text-gray-600 hover:bg-gray-100 border border-gray-200'"
              class="px-4 py-1.5 rounded-full text-sm font-medium transition" x-text="f.label"></button>
    </template>
  </div>

  <!-- Stats row -->
  <div class="grid grid-cols-4 gap-4 mb-8">
    <template x-for="stat in stats" :key="stat.label">
      <div class="bg-white rounded-xl border border-gray-200 p-4">
        <p class="text-sm text-gray-500" x-text="stat.label"></p>
        <p class="text-2xl font-bold mt-1" :class="stat.color" x-text="stat.value"></p>
      </div>
    </template>
  </div>

  <!-- Strategy Cards -->
  <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-5">
    <template x-for="s in filteredStrategies" :key="s.id">
      <div class="bg-white rounded-xl border border-gray-200 hover:border-indigo-300 hover:shadow-md transition-all overflow-hidden">
        <!-- Card Top -->
        <div class="p-5">
          <div class="flex items-start justify-between mb-3">
            <div class="flex-1 min-w-0">
              <span class="text-xs font-medium px-2 py-0.5 rounded-full mr-2"
                    :class="'status-' + s.status.toLowerCase()" x-text="s.status"></span>
            </div>
            <div class="flex items-center gap-1 text-xs text-gray-400">
              <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
              <span x-text="s.year"></span>
            </div>
          </div>
          <h3 class="font-semibold text-gray-900 text-base mb-1" x-text="s.name"></h3>
          <p class="text-gray-500 text-xs mb-4 line-clamp-2" x-text="s.description"></p>

          <!-- Element type pills -->
          <div class="flex flex-wrap gap-1.5 mb-4">
            <template x-for="t in s.elementTypes" :key="t.name">
              <span class="text-xs px-2 py-0.5 rounded-full font-medium"
                    :style="`background:${t.color}22; color:${t.color}`" x-text="t.name"></span>
            </template>
          </div>

          <!-- Progress bar -->
          <div class="mb-1 flex items-center justify-between text-xs">
            <span class="text-gray-500">Overall Progress</span>
            <span class="font-semibold text-gray-700" x-text="s.progress + '%'"></span>
          </div>
          <div class="w-full bg-gray-100 rounded-full h-2">
            <div class="h-2 rounded-full bg-indigo-500 transition-all" :style="`width:${s.progress}%`"></div>
          </div>
        </div>

        <!-- Card Footer -->
        <div class="border-t border-gray-100 px-5 py-3 bg-gray-50 flex items-center justify-between">
          <div class="flex items-center gap-3 text-xs text-gray-500">
            <span class="flex items-center gap-1">
              <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
              <span x-text="s.members + ' members'"></span>
            </span>
            <span class="flex items-center gap-1">
              <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9" stroke-width="2"/><path stroke-linecap="round" stroke-width="2" d="M12 7v5l3 3"/></svg>
              <span x-text="s.elements + ' elements'"></span>
            </span>
          </div>
          <a :href="'strategy-builder.html?id=' + s.id"
             class="text-sm text-indigo-600 hover:text-indigo-700 font-medium flex items-center gap-1">
            Open
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
          </a>
        </div>
      </div>
    </template>
  </div>

</div>

<script>
function app() {
  return {
    activeFilter: 'all',
    filters: [
      { key: 'all', label: 'All' },
      { key: 'active', label: 'Active' },
      { key: 'draft', label: 'Draft' },
      { key: 'completed', label: 'Completed' },
    ],
    stats: [
      { label: 'Total Strategies', value: 5, color: 'text-gray-900' },
      { label: 'Active', value: 2, color: 'text-green-600' },
      { label: 'Avg. Progress', value: '43%', color: 'text-indigo-600' },
      { label: 'Total Elements', value: 47, color: 'text-gray-900' },
    ],
    strategies: [
      {
        id: 1, name: 'National Digital Transformation 2025–2030',
        description: 'Accelerate the adoption of digital services across all government entities to improve citizen experience.',
        status: 'ACTIVE', year: '2025–2030', progress: 34,
        members: 12, elements: 18,
        elementTypes: [
          { name: 'Pillar', color: '#6366f1' },
          { name: 'Goal', color: '#10b981' },
          { name: 'Initiative', color: '#f59e0b' },
          { name: 'Program', color: '#8b5cf6' },
        ]
      },
      {
        id: 2, name: 'Healthcare Infrastructure Improvement',
        description: 'Upgrade medical facilities and expand access to primary care services in underserved regions.',
        status: 'ACTIVE', year: '2024–2027', progress: 61,
        members: 8, elements: 12,
        elementTypes: [
          { name: 'Goal', color: '#10b981' },
          { name: 'Initiative', color: '#f59e0b' },
          { name: 'Milestone', color: '#ec4899' },
        ]
      },
      {
        id: 3, name: 'Education Excellence Plan',
        description: 'Reform curriculum standards and improve teacher training programs at scale.',
        status: 'DRAFT', year: '2026–2030', progress: 0,
        members: 5, elements: 6,
        elementTypes: [
          { name: 'Pillar', color: '#6366f1' },
          { name: 'Goal', color: '#10b981' },
          { name: 'Initiative', color: '#f59e0b' },
        ]
      },
      {
        id: 4, name: 'Sustainable Energy Transition',
        description: 'Reduce carbon emissions by 40% through renewable energy adoption and efficiency programs.',
        status: 'ON_HOLD', year: '2023–2028', progress: 28,
        members: 9, elements: 11,
        elementTypes: [
          { name: 'Goal', color: '#10b981' },
          { name: 'Initiative', color: '#f59e0b' },
        ]
      },
      {
        id: 5, name: 'Smart City Pilot — Al Riyadh',
        description: 'Deploy IoT infrastructure, intelligent transport, and smart utilities across 3 city districts.',
        status: 'COMPLETED', year: '2022–2025', progress: 100,
        members: 15, elements: 0,
        elementTypes: [
          { name: 'Pillar', color: '#6366f1' },
          { name: 'Goal', color: '#10b981' },
          { name: 'Initiative', color: '#f59e0b' },
          { name: 'Milestone', color: '#ec4899' },
        ]
      },
    ],
    get filteredStrategies() {
      if (this.activeFilter === 'all') return this.strategies;
      return this.strategies.filter(s => s.status.toLowerCase() === this.activeFilter);
    }
  }
}
</script>
</body>
</html>

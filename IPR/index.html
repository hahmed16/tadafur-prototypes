// Modal
let mStk=[];
function showModal({title,body,footer,size='mdl',onClose}){
  const id='m'+uid();
  const ov=document.createElement('div');ov.className='mov';ov.id=id;
  ov.innerHTML=`<div class="${size}"><div class="mh"><div class="mt2">${title}</div><button class="btn bgh bic" onclick="closeModal()"><i class="fas fa-times"></i></button></div><div class="mb2">${body}</div>${footer?`<div class="mf">${footer}</div>`:''}</div>`;
  ov.addEventListener('click',e=>{if(e.target===ov)closeModal()});
  document.getElementById('modals').appendChild(ov);mStk.push({id,onClose});
}
function closeModal(){
  const it=mStk.pop();if(!it)return;
  const el=document.getElementById(it.id);
  if(el){el.style.opacity='0';el.style.transition='opacity .18s';setTimeout(()=>el.remove(),180)}
  if(it.onClose)it.onClose();
}
function showConfirm(msg,cb,type='dn'){
  showModal({title:'تأكيد الإجراء',size:'msm',
    body:`<div class="al ${type==='dn'?'al-d':'al-w'}"><i class="fas fa-exclamation-triangle"></i><span>${esc(msg)}</span></div>`,
    footer:`<button class="btn bou" onclick="closeModal()">إلغاء</button><button class="btn b${type}" id="cy">تأكيد</button>`});
  setTimeout(()=>{const b=document.getElementById('cy');if(b)b.onclick=()=>{closeModal();cb()}},50);
}

function notify(msg,t='s'){
  const n=document.createElement('div');n.className=`notif n${t}`;
  n.innerHTML=`<i class="fas fa-${t==='s'?'check-circle':t==='e'?'times-circle':'exclamation-circle'}"></i> ${esc(msg)}`;
  document.body.appendChild(n);
  setTimeout(()=>{n.style.opacity='0';n.style.transition='opacity .28s';setTimeout(()=>n.remove(),280)},3000);
}

// Router
const routes={};
function route(p,fn){routes[p]=fn}
function navigate(p){window.location.hash=p}
function resolveRoute(){
  const hash=window.location.hash.slice(1)||'/reports';
  for(const pat of Object.keys(routes)){
    const re=new RegExp('^'+pat.replace(/:[^/]+/g,'([^/]+)')+'$');
    const m=hash.match(re);
    if(m){const pn=[...pat.matchAll(/:([^/]+)/g)].map(x=>x[1]);const ps={};pn.forEach((n,i)=>ps[n]=m[i+1]);routes[pat](ps);return}
  }
  renderLayout('<div class="es"><i class="fas fa-search"></i><h3>الصفحة غير موجودة</h3></div>',[],'/reports');
}
window.addEventListener('hashchange',resolveRoute);

function filterR(){
  const s=(document.getElementById('rsch')?.value||'').toLowerCase();
  const f=document.getElementById('rflt')?.value||'';
  let R=ST.R;if(s)R=R.filter(r=>r.name.toLowerCase().includes(s));if(f)R=R.filter(r=>r.status===f);
  const el=document.getElementById('rtbl');if(el)el.innerHTML=renderRTable(R);
}
function renderReportActions(r){
  const ops=[`<option value="">إجراءات إضافية</option>`];
  if(r.status==='DRAFT')ops.push(`<option value="publish">نشر</option>`);
  if(r.status==='PUBLISHED'){ops.push(`<option value="approve">اعتماد</option>`);ops.push(`<option value="evaluate">تقييم</option>`);}
  ops.push(`<option value="clone">نسخ</option>`);
  ops.push(`<option value="delete">حذف</option>`);
  return `<div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
    <button class="btn bgh bic" title="عرض" onclick="navigate('/reports/view/${r.id}')"><i class="fas fa-eye" style="color:#0891b2"></i></button>
    ${r.status!=='EVALUATED'?`<button class="btn bgh bic" title="تحرير" onclick="navigate('/reports/edit/${r.id}')"><i class="fas fa-pen" style="color:#7c3aed"></i></button>`:''}
    <select class="fc" style="min-width:132px;padding:6px 8px" onchange="handleReportAction(this,'${r.id}')">${ops.join('')}</select>
  </div>`;
}
function handleReportAction(el,id){
  const act=el.value;el.value='';
  if(!act)return;
  if(act==='publish')return pubReport(id);
  if(act==='approve')return approveReport(id);
  if(act==='evaluate')return navigate('/reports/evaluate/'+id);
  if(act==='clone')return cloneRpt(id);
  if(act==='delete')return deleteRpt(id);
}
function renderRTable(R){
  if(!R.length)return`<div class="es"><i class="fas fa-folder-open"></i><h3>لا توجد تقارير</h3><p>انقر على "إنشاء تقرير جديد" للبدء</p></div>`;
  return`<div class="tw"><table class="dt"><thead><tr><th style="width:36px">#</th><th>اسم التقرير</th><th>القالب</th><th>الفترة</th><th>الحالة</th><th>التقدم</th><th>الدرجة</th><th style="width:170px">الإجراءات</th></tr></thead><tbody>
  ${R.map((r,i)=>{
    const tmpl=ST.T.find(t=>t.id===r.tid);const st=STATUSES[r.status]||STATUSES.DRAFT;
    const passed=r.groups.filter(g=>g.status==='DATA_REVIEWED_PASSED').length;const prog=r.groups.length?Math.round(passed/r.groups.length*100):0;
    const score=calcRptScore(r);
    return`<tr>
      <td style="color:var(--txm);font-weight:700">${i+1}</td>
      <td><div style="font-weight:700">${esc(r.name)}</div><div style="font-size:11px;color:var(--txm);margin-top:2px"><i class="fas fa-calendar-alt" style="margin-left:3px"></i>${fdt(r.ca)} · <i class="fas fa-user" style="margin-left:3px"></i>${esc(gu(r.cby)?.n||'—')}</div></td>
      <td style="font-size:11px;color:var(--txm);max-width:170px;white-space:normal;line-height:1.4">${esc(tmpl?.name||'—')}</td>
      <td style="font-size:12px">${fdt(r.sd)}<br><span style="color:var(--txl);font-size:11px">← ${fdt(r.ed)}</span></td>
      <td><span class="bdg ${st.c}"><span class="bdt" style="background:currentColor"></span>${st.l}</span></td>
      <td style="min-width:96px">
        <div style="display:flex;align-items:center;gap:6px"><div class="pb" style="flex:1"><div class="pf" style="width:${prog}%;background:${prog===100?'var(--sul)':'var(--prl)'}"></div></div><span style="font-size:11px;font-weight:700;color:var(--txm);min-width:28px">${prog}%</span></div>
        <div style="font-size:10px;color:var(--txl);margin-top:1px">${passed}/${r.groups.length} مجموعة</div>
      </td>
      <td>${score!=null?`<div style="display:flex;align-items:center;gap:5px"><div style="width:28px;height:28px;border-radius:50%;background:${scC(score)}18;color:${scC(score)};display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;border:1.5px solid ${scC(score)}">${score.toFixed(1)}</div><div style="font-size:10px;font-weight:700;color:${scC(score)}">${scL(score)}</div></div>`:`<span style="font-size:11px;color:var(--txl)">—</span>`}</td>
      <td>${renderReportActions(r)}</td>
    </tr>`;}).join('')}

}
function pubReport(id){showConfirm('هل تريد نشر هذا التقرير؟',()=>{const r=ST.R.find(x=>x.id===id);if(r){r.status='PUBLISHED';saveST();notify('تم نشر التقرير بنجاح');resolveRoute()}},'wn');}

function deleteRpt(id){showConfirm('هل تريد حذف هذا التقرير نهائياً؟ لا يمكن التراجع.',()=>{ST.R=ST.R.filter(r=>r.id!==id);saveST();notify('تم حذف التقرير','w');resolveRoute();});}
function cloneRpt(id){
  const src=ST.R.find(r=>r.id===id);if(!src)return;
  showModal({title:'نسخ التقرير',
    body:`<div class="al al-i"><i class="fas fa-info-circle"></i>سيتم إنشاء نسخة جديدة مع إعادة تعيين الحالات والدرجات.</div>

    footer:`<button class="btn bou" onclick="closeModal()">إلغاء</button><button class="btn bpr" onclick="doClone('${id}')">إنشاء النسخة</button>`});
}
function doClone(id){
  const src=ST.R.find(r=>r.id===id);const name=document.getElementById('cl-n')?.value?.trim();
  const sd=document.getElementById('cl-sd')?.value;const ed=document.getElementById('cl-ed')?.value;
  if(!name){notify('يرجى إدخال الاسم','e');return}
  const nr=JSON.parse(JSON.stringify(src));
  nr.id='r'+uid();nr.name=name;nr.sd=sd;nr.ed=ed;nr.status='DRAFT';nr.ca=new Date().toISOString().split('T')[0];nr.clonedFrom=id;
  nr.groups.forEach(g=>{g.id='rg'+uid();g.status='PENDING';g.es=null;g.en='';g.lists.forEach(l=>{l.id='rl'+uid();l.rows.forEach(rw=>{rw.id='rw'+uid();rw.es=null;rw.en=''})})});
  ST.R.push(nr);saveST();closeModal();notify('تم إنشاء النسخة');navigate('/reports/edit/'+nr.id);
}

function saveRpt(status){
  const name=document.getElementById('rn')?.value?.trim();
  const tid=document.getElementById('rt')?.value;
  const sd=document.getElementById('rsd')?.value;const ed=document.getElementById('red')?.value;
  if(!name){notify('يرجى إدخال اسم التقرير','e');return}
  if(!tid){notify('يرجى اختيار القالب','e');return}
  if(!sd||!ed){notify('يرجى تحديد تواريخ التقرير','e');return}
  const tmpl=ST.T.find(t=>t.id===tid);if(!tmpl)return;
  const groups=tmpl.groups.map(g=>({
    id:'rg'+uid(),tgid:g.id,name:g.name,cp:g.cp,status:'PENDING',es:null,en:'',
    members:JSON.parse(JSON.stringify(g.members||[])),
    lists:g.lists.map(l=>({id:'rl'+uid(),tlid:l.id,name:l.name,cp:l.cp,hasPR:l.hasPR,cols:JSON.parse(JSON.stringify(l.cols)),
      rows:l.hasPR?l.prows.map(pr=>({...JSON.parse(JSON.stringify(pr)),es:null,en:''})):[]}))}));
  const rpt={id:'r'+uid(),name,tid,sd,ed,status,ca:new Date().toISOString().split('T')[0],cby:CU.id,clonedFrom:null,members:window._nm||[],groups};
  ST.R.push(rpt);saveST();notify(status==='PUBLISHED'?'تم إنشاء التقرير ونشره':'تم حفظ التقرير كمسودة');navigate('/reports/view/'+rpt.id);
}

function switchTab(idx,rid,editMode){

function renderFillTable(l,editMode,rid,gid){
  if(!l.cols||!l.cols.length)return`<div style="padding:16px;color:var(--txm);text-align:center">لا توجد أعمدة</div>`;
  const ha=editMode&&!l.hasPR;
  return`<table class="ft"><thead><tr>${l.cols.map(c=>`<th>${esc(c.h)}</th>`).join('')}${ha?'<th style="width:46px"></th>':''}</tr></thead><tbody>
  ${l.rows.map(row=>`<tr>
    ${l.cols.map(c=>`<td class="${c.t==='label'?'lbc':''}">${c.t==='label'?`<strong>${esc(row.cells[c.id]||'')}</strong>`:editMode?renderCell(c,row,rid,gid,l.id):`<div style="${c.t==='textarea'?'white-space:pre-wrap;':''}font-size:11px;padding:6px 4px">${esc(row.cells[c.id]||'—')}</div>`}</td>`).join('')}
    ${ha?`<td><button class="btn bgh bxs" style="color:var(--dnl)" onclick="delRow('${rid}','${gid}','${l.id}','${row.id}')"><i class="fas fa-trash"></i></button></td>`:''}
  </tr>`).join('')}
  ${!l.rows.length?`<tr><td colspan="${l.cols.length+(ha?1:0)}" style="text-align:center;padding:22px;color:var(--txm);font-size:12px"><i class="fas fa-inbox" style="font-size:22px;display:block;margin-bottom:8px;opacity:.25"></i>${editMode&&!l.hasPR?'انقر على "إضافة سجل" لإدراج البيانات':'لا توجد بيانات بعد'}</td></tr>`:''}
  </tbody></table>`;
}
function renderCell(c,row,rid,gid,lid){
  const v=row.cells[c.id]||'';const k=`${rid}|${gid}|${lid}|${row.id}|${c.id}`;
  if(c.t==='textarea')return`<textarea class="fi tafi" style="min-height:54px;resize:none;overflow:hidden" data-k="${k}" oninput="autoGrow(this)" onchange="updCell(this)">${esc(v)}</textarea>`;
  if(c.t==='date')return`<input type="date" class="fi" value="${esc(v)}" data-k="${k}" onchange="updCell(this)"/>`;
  if(c.t==='percent'||c.t==='number')return`<input type="number" class="fi" value="${esc(v)}" placeholder="0" min="0"${c.t==='percent'?' max="100"':''} data-k="${k}" onchange="updCell(this)" style="text-align:center"/>`;
  return`<input type="text" class="fi" value="${esc(v)}" data-k="${k}" onchange="updCell(this)"/>`;
}
function autoGrow(el){
  if(!el)return;
  el.style.height='auto';
  el.style.height=(el.scrollHeight+2)+'px';
}
function initAutoGrowTextareas(){
  document.querySelectorAll('textarea.tafi').forEach(autoGrow);
}
function updCell(el){
  const[rid,gid,lid,rwid,cid]=el.getAttribute('data-k').split('|');
  const r=ST.R.find(x=>x.id===rid);const g=r?.groups.find(x=>x.id===gid);const l=g?.lists.find(x=>x.id===lid);const rw=l?.rows.find(x=>x.id===rwid);
  if(rw){rw.cells[cid]=el.value;saveST()}
}
function updGrpStatus(rid,gid,ns){
  const r=ST.R.find(x=>x.id===rid);const g=r?.groups.find(x=>x.id===gid);if(!g)return;
  g.status=ns;
  if(r.groups.every(g2=>g2.status==='DATA_REVIEWED_PASSED')){r.status='REVIEWED';notify('تم اعتماد جميع المجموعات — حالة التقرير: تمت المراجعة');}
  saveST();notify('تم تحديث حالة المجموعة');
  const h=window.location.hash.slice(1);const tc=document.getElementById('tc');
  if(tc)tc.innerHTML=renderGroupTab(r,ATAB,h.startsWith('/reports/edit/'));
  initAutoGrowTextareas();
}
function addRow(rid,gid,lid){
  const r=ST.R.find(x=>x.id===rid);const g=r?.groups.find(x=>x.id===gid);const l=g?.lists.find(x=>x.id===lid);if(!l)return;
  const nr={id:'rw'+uid(),cells:{},es:null,en:''};
  l.cols.filter(c=>c.t==='label').slice(0,1).forEach(c=>{nr.cells[c.id]=String(l.rows.length+1)});
  l.rows.push(nr);saveST();
  const h=window.location.hash.slice(1);const tc=document.getElementById('tc');if(tc)tc.innerHTML=renderGroupTab(r,ATAB,h.startsWith('/reports/edit/'));
  initAutoGrowTextareas();
}
function delRow(rid,gid,lid,rwid){
  const r=ST.R.find(x=>x.id===rid);const g=r?.groups.find(x=>x.id===gid);const l=g?.lists.find(x=>x.id===lid);if(!l)return;
  l.rows=l.rows.filter(x=>x.id!==rwid);saveST();notify('تم حذف السجل','w');
  const h=window.location.hash.slice(1);const tc=document.getElementById('tc');if(tc)tc.innerHTML=renderGroupTab(r,ATAB,h.startsWith('/reports/edit/'));
  initAutoGrowTextareas();
}
function addGrpMember(rid,gid){
  const r=ST.R.find(x=>x.id===rid);const g=r?.groups.find(x=>x.id===gid);if(!g)return;
  const ex=(g.members||[]).map(m=>m.uid);const av=USERS.filter(u=>!ex.includes(u.id));
  showModal({title:'إضافة عضو للمجموعة',
    body:`<div class="fg"><label class="fl">المستخدم <span class="rq">*</span></label><select class="fc" id="gmu"><option value="">-- اختر --</option>${av.map(u=>`<option value="${u.id}">${esc(u.n)} (${esc(u.r)})</option>`).join('')}</select></div>
    <div class="fg"><label class="fl">الصلاحيات</label><div style="display:flex;gap:12px;flex-wrap:wrap">${PERMS.map(p=>`<label style="display:flex;align-items:center;gap:5px;cursor:pointer;font-size:12.5px"><input type="checkbox" name="gmp" value="${p}" ${p==='view'?'checked':''}/>${PL[p]}</label>`).join('')}</div></div>`,
    footer:`<button class="btn bou" onclick="closeModal()">إلغاء</button><button class="btn bpr" onclick="confAddGM('${rid}','${gid}')">إضافة</button>`});
}
function confAddGM(rid,gid){
  const u=document.getElementById('gmu')?.value;if(!u){notify('يرجى اختيار مستخدم','e');return}
  const p=[...document.querySelectorAll('input[name="gmp"]:checked')].map(x=>x.value);
  const r=ST.R.find(x=>x.id===rid);const g=r?.groups.find(x=>x.id===gid);if(!g)return;
  if(!g.members)g.members=[];g.members.push({uid:u,p});saveST();closeModal();notify('تم إضافة العضو');
  const h=window.location.hash.slice(1);const tc=document.getElementById('tc');if(tc)tc.innerHTML=renderGroupTab(r,ATAB,h.startsWith('/reports/edit/'));

function renderMembersList(members,canEdit,ctx,ctxType){
  if(!members||!members.length)return'';
  return members.map(m=>{const u=gu(m.uid);if(!u)return'';
    return`<div class="mr"><div class="mav" style="background:${u.cl}">${ini(u.n)}</div>
      <div><div style="font-size:12.5px;font-weight:700">${esc(u.n)}</div><div style="font-size:11px;color:var(--txm)">${esc(u.r)}</div></div>
      <div style="display:flex;gap:3px;flex-wrap:wrap">${m.p.map(p=>`<span class="pchip ${PC[p]}">${PL[p]}</span>`).join('')}</div>
      ${canEdit&&ctx?`<button class="btn bgh bxs" style="color:var(--dnl);margin-right:auto" onclick="removeMember('${ctx.rid||''}','${ctx.gid||''}','${m.uid}','${ctxType}')"><i class="fas fa-times"></i></button>`:''}
    </div>`;}).join('');
}
function removeMember(rid,gid,userId,ctxType){
  const r=ST.R.find(x=>x.id===rid);if(!r)return;
  if(gid&&ctxType==='grp'){const g=r.groups.find(x=>x.id===gid);if(g)g.members=g.members.filter(m=>m.uid!==userId);}
  else{r.members=r.members.filter(m=>m.uid!==userId)}
  saveST();notify('تم إزالة العضو','w');
  const h=window.location.hash.slice(1);const tc=document.getElementById('tc');if(tc)tc.innerHTML=renderGroupTab(r,ATAB,h.startsWith('/reports/edit/'));
}

function switchEvalTab(idx,rid){

function renderEvalTab(r,ti){
  const g=r.groups[ti];if(!g)return'';

function setGrpSc(rid,gid,score){
  const r=ST.R.find(x=>x.id===rid);const g=r?.groups.find(x=>x.id===gid);if(!g)return;
  g.es=score;g.en=document.getElementById('gen-'+gid)?.value||'';
  const overall=calcRptScore(r);saveST();
  const ti=r.groups.indexOf(g);document.getElementById('ec').innerHTML=renderEvalTab(r,ti);
  const osc=document.getElementById('ov-sc'),olb=document.getElementById('ov-lb');
  if(osc)osc.innerHTML=overall!=null?overall.toFixed(2):'—';if(osc)osc.style.color=scC(overall);
  if(olb){olb.textContent=scL(overall);olb.style.color=scC(overall)}
  const gsn=document.getElementById('gsn-'+gid),gspf=document.getElementById('gspf-'+gid);
  if(gsn){gsn.textContent=score.toFixed(1);gsn.style.color=scC(score)}
  if(gspf){gspf.style.width=(score/6*100)+'%';gspf.style.background=scC(score)}
  notify(`تم تقييم المجموعة: ${score}/6`);
}
function setRowSc(rid,gid,lid,rwid,score){
  const r=ST.R.find(x=>x.id===rid);const g=r?.groups.find(x=>x.id===gid);const l=g?.lists.find(x=>x.id===lid);const rw=l?.rows.find(x=>x.id===rwid);if(!rw)return;
  rw.es=score;const allR=g.lists.flatMap(l2=>l2.rows);const sc=allR.filter(x=>x.es!=null);
  if(sc.length){g.es=parseFloat((sc.reduce((a,x)=>a+x.es,0)/sc.length).toFixed(2))}
  saveST();const ti=r.groups.indexOf(g);document.getElementById('ec').innerHTML=renderEvalTab(r,ti);notify(`تم تقييم السجل: ${score}/6`);
}
function updEN(el){
  const[rid,gid,lid,rwid]=el.getAttribute('data-ek').split('|');
  const r=ST.R.find(x=>x.id===rid);const g=r?.groups.find(x=>x.id===gid);const l=g?.lists.find(x=>x.id===lid);const rw=l?.rows.find(x=>x.id===rwid);
  if(rw){rw.en=el.value;saveST()}
}
function saveEval(rid){
  const r=ST.R.find(x=>x.id===rid);if(!r)return;
  r.groups.forEach(g=>{const el=document.getElementById('gen-'+g.id);if(el)g.en=el.value});
  r.status='EVALUATED';saveST();notify('تم حفظ التقييم بنجاح');navigate('/reports/view/'+rid);
}

function delTmpl(id){

}
function cloneTmpl(id){
  const src=ST.T.find(t=>t.id===id);if(!src)return;

}

    </div>
    ${l.hasPR?`<div style="margin-top:12px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:7px"><div class="slab" style="flex:1;margin-bottom:0">الصفوف المحددة مسبقاً</div>
        <button class="btn bou bsm" style="margin-right:8px" onclick="addPR('${gid}','${l.id}')"><i class="fas fa-plus"></i> صف</button></div>
      <div id="prc-${l.id}">${l.prows.map((pr,ri)=>renderPRRow(gid,l.id,pr,ri,l.cols)).join('')}</div>
    </div>`:''}
  </div>
  </div>`;
}
function renderColRow(gid,lid,col,ci){
  const ct=CTYPES[col.t]||CTYPES.text;
  return`<div class="cp2" id="cp-${col.id}">
    <div class="dh"><i class="fas fa-grip-vertical"></i></div>
    <span class="nbdg" style="font-size:10px">${ci+1}</span>
    <input class="fc" style="flex:2" value="${esc(col.h)}" placeholder="رأس العمود..." oninput="updCF('${gid}','${lid}','${col.id}','h',this.value)"/>
    <select class="fc" style="flex:1;max-width:135px" onchange="updCF('${gid}','${lid}','${col.id}','t',this.value)">${Object.entries(CTYPES).map(([k,v])=>`<option value="${k}" ${col.t===k?'selected':''}>${v.l}</option>`).join('')}</select>
    <span class="ct3 ${ct.c}" id="ctb-${col.id}"><i class="fas ${ct.i}"></i></span>
    <button class="btn bgh bxs" onclick="rmCol('${gid}','${lid}','${col.id}')" style="color:var(--dnl)"><i class="fas fa-times"></i></button>
  </div>`;
}
function renderPRRow(gid,lid,pr,ri,cols){
  const ec=cols.slice(0,4);
  return`<div class="cp2" id="pr-${pr.id}" style="align-items:flex-start;flex-wrap:wrap;gap:5px">
    <span class="nbdg" style="font-size:10px;margin-top:4px">${ri+1}</span>
    ${ec.map(c=>`<input class="fc" style="flex:1;min-width:90px" value="${esc(pr.cells[c.id]||'')}" placeholder="${esc(c.h)}" oninput="updPC('${gid}','${lid}','${pr.id}','${c.id}',this.value)"/>`).join('')}
    <button class="btn bgh bxs" onclick="rmPR('${gid}','${lid}','${pr.id}')" style="color:var(--dnl);margin-top:4px"><i class="fas fa-times"></i></button>
  </div>`;
}
function togGC(gid){const b=document.getElementById('gb-'+gid),a=document.getElementById('gar-'+gid);if(!b)return;const o=b.style.display!=='none';b.style.display=o?'none':'';if(a)a.style.transform=o?'':'rotate(180deg)'}
function togLC(lid){const b=document.getElementById('lb-'+lid),a=document.getElementById('lar-'+lid);if(!b)return;const o=b.style.display!=='none';b.style.display=o?'none':'block';if(a)a.style.transform=o?'':'rotate(180deg)'}
function addGrp(){const g={id:'g'+uid(),name:'',cp:10,members:[],lists:[]};TS.groups.push(g);refGC();setTimeout(()=>{togGC(g.id);updTW()},30)}
function rmGrp(gid){TS.groups=TS.groups.filter(g=>g.id!==gid);refGC()}
function updGF(gid,f,v){const g=TS.groups.find(x=>x.id===gid);if(g){g[f]=v;if(f==='cp')updTW()}}
function updTW(){const tw=TS.groups.reduce((s,g)=>s+g.cp,0);const el=document.getElementById('tw');if(el){el.textContent=tw+'%';el.style.color=tw===100?'var(--sul)':'var(--dnl)'}}
function addList(gid){const g=TS.groups.find(x=>x.id===gid);if(!g)return;const l={id:'l'+uid(),name:'',cp:100,hasPR:false,cols:[],prows:[]};g.lists.push(l);const c=document.getElementById('lc-'+gid);if(c){const d=document.createElement('div');d.innerHTML=renderListB(gid,l,g.lists.length-1);c.appendChild(d.firstElementChild)}}
function rmList(gid,lid){const g=TS.groups.find(x=>x.id===gid);if(!g)return;g.lists=g.lists.filter(l=>l.id!==lid);const el=document.getElementById('lsc-'+lid);if(el)el.remove()}
function updLF(gid,lid,f,v){const g=TS.groups.find(x=>x.id===gid);const l=g?.lists.find(x=>x.id===lid);if(l)l[f]=v}
function togPR(gid,lid){
  const g=TS.groups.find(x=>x.id===gid);const l=g?.lists.find(x=>x.id===lid);if(!l)return;
  l.hasPR=!l.hasPR;const tg=document.getElementById('tg-'+lid);if(tg)tg.classList.toggle('on',l.hasPR);
  const lb=document.getElementById('lb-'+lid);if(!lb)return;
  const gi=TS.groups.indexOf(g);const li=g.lists.indexOf(l);
  const d=document.createElement('div');d.innerHTML=renderListB(gid,l,li);
  const nb=d.querySelector('#lb-'+lid);if(nb){nb.style.display='block';lb.innerHTML=nb.innerHTML;lb.style.display='block'}
}
function addCol(gid,lid){const g=TS.groups.find(x=>x.id===gid);const l=g?.lists.find(x=>x.id===lid);if(!l)return;const col={id:'c'+uid(),h:'',t:'text'};l.cols.push(col);const c=document.getElementById('cols-'+lid);if(c){const d=document.createElement('div');d.innerHTML=renderColRow(gid,lid,col,l.cols.length-1);c.appendChild(d.firstElementChild)}}
function rmCol(gid,lid,cid){const g=TS.groups.find(x=>x.id===gid);const l=g?.lists.find(x=>x.id===lid);if(!l)return;l.cols=l.cols.filter(c=>c.id!==cid);const el=document.getElementById('cp-'+cid);if(el)el.remove()}
function updCF(gid,lid,cid,f,v){
  const g=TS.groups.find(x=>x.id===gid);const l=g?.lists.find(x=>x.id===lid);const c=l?.cols.find(x=>x.id===cid);
  if(c){c[f]=v;if(f==='t'){const ct=CTYPES[v]||CTYPES.text;const b=document.getElementById('ctb-'+cid);if(b){b.className='ct3 '+ct.c;b.innerHTML=`<i class="fas ${ct.i}"></i>`}}}
}
function addPR(gid,lid){const g=TS.groups.find(x=>x.id===gid);const l=g?.lists.find(x=>x.id===lid);if(!l)return;const pr={id:'pr'+uid(),cells:{},es:null,en:''};l.prows.push(pr);const c=document.getElementById('prc-'+lid);if(c){const d=document.createElement('div');d.innerHTML=renderPRRow(gid,lid,pr,l.prows.length-1,l.cols);c.appendChild(d.firstElementChild)}}
function rmPR(gid,lid,prid){const g=TS.groups.find(x=>x.id===gid);const l=g?.lists.find(x=>x.id===lid);if(!l)return;l.prows=l.prows.filter(r=>r.id!==prid);const el=document.getElementById('pr-'+prid);if(el)el.remove()}
function updPC(gid,lid,prid,cid,v){const g=TS.groups.find(x=>x.id===gid);const l=g?.lists.find(x=>x.id===lid);const pr=l?.prows.find(x=>x.id===prid);if(pr)pr.cells[cid]=v}
function refGC(){
  const c=document.getElementById('gc');if(!c)return;
  c.innerHTML=TS.groups.length?TS.groups.map((g,i)=>renderGrpB(g,i)).join(''):`<div class="es"><i class="fas fa-object-group"></i><h3>لا توجد مجموعات</h3><p>أضف مجموعة لتعريف هيكل التقرير</p></div>`;
  updTW();
}
function saveTmpl(){
  TS.name=document.getElementById('tn')?.value?.trim();
  TS.desc=document.getElementById('td')?.value?.trim();
  TS.sd=document.getElementById('tsd')?.value;TS.ed=document.getElementById('ted')?.value;
  if(!TS.name){notify('يرجى إدخال اسم القالب','e');return}
  if(!TS.groups.length){notify('يرجى إضافة مجموعة واحدة على الأقل','e');return}
  const ex=ST.T.find(t=>t.id===TS.id);
  if(ex)Object.assign(ex,TS);else ST.T.push(TS);
  saveST();notify('تم حفظ القالب بنجاح');navigate('/templates');
}

route('/users',()=>{
  renderLayout(`
  <div class="ph"><div><h2><i class="fas fa-users" style="color:var(--scl);margin-left:8px"></i>المستخدمون</h2><p>إدارة المستخدمين وتبديل المستخدم الحالي للاختبار</p></div></div>
  <div class="al al-i"><i class="fas fa-info-circle"></i><span>تبديل المستخدم هنا يؤثر على الصلاحيات المعروضة في الواجهة — يُستخدم لأغراض الاختبار والمراجعة.</span></div>
  <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px">
    ${USERS.map(u=>`<div class="card" style="padding:14px 18px;display:flex;align-items:center;gap:12px;transition:border-color .17s;${CU.id===u.id?'border:2px solid var(--prl);background:var(--prxl)':''}">
      <div style="width:46px;height:46px;border-radius:50%;background:${u.cl};display:flex;align-items:center;justify-content:center;color:#fff;font-size:15px;font-weight:800;flex-shrink:0">${ini(u.n)}</div>
      <div style="flex:1"><div style="font-size:13.5px;font-weight:800">${esc(u.n)}</div><div style="font-size:11.5px;color:var(--txm)">${esc(u.r)}</div></div>
      ${CU.id===u.id?`<span class="bdg bd-rv" style="font-size:10px"><i class="fas fa-check" style="font-size:9px"></i> نشط</span>`:`<button class="btn bou bsm" onclick="switchUser('${u.id}')">تبديل</button>`}
    </div>`).join('')}
  </div>`,[{l:'المستخدمون'}],'/users');
});
function switchUser(uid2){CU=gu(uid2)||CU;notify('تم التبديل إلى: '+CU.n);resolveRoute()}
